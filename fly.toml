# fly.toml app configuration file generated for open-proxy-mcp on 2026-04-13T04:26:29Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'open-proxy-mcp'
primary_region = 'iad'

[build]

[env]
  # v2 (11 tool) 운영 기본. v1은 opm_v1 브랜치에 보존.
  # 필요시 'hybrid'(v1+v2) 또는 'v1'(36 tool)으로 전환 가능.
  OPEN_PROXY_TOOLSET = 'v2'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
