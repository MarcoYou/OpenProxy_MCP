# fly.toml app configuration file generated for open-proxy-mcp on 2026-04-13T04:26:29Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'open-proxy-mcp'
primary_region = 'iad'

[build]

[env]
  # v2 (11 tool) 운영 기본. v1은 opm_v1 브랜치에 보존.
  # 필요시 'hybrid'(v1+v2) 또는 'v1'(36 tool)으로 전환 가능.
  OPEN_PROXY_TOOLSET = 'v2'
  # sqlite master cache (corpCode 영구화) — fly volume mount 위치
  OPM_MASTER_DB_PATH = '/data/master.db'

[mounts]
  source = 'opm_data'
  destination = '/data'

[http_service]
  internal_port = 8000
  force_https = true
  # 'suspend' = 메모리 snapshot 유지 → 재시작 ms 단위 (cold start 페널티 제거).
  # 'stop'은 완전 종료라 재시작마다 Python boot + FastMCP init 5-15s 발생.
  # 2026-04-13 "Fly.io Launch" 자동 덮어쓰기로 stop이 됐었음 → suspend 복구 (260507).
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  # 1대 항상 가동 — cold start 페널티 (3-6s) 제거.
  # 'suspend' 모드여도 idle 시 Firecracker VM 재시작 + Python boot + memory cache 휘발.
  # min=1이면 corpCode sqlite/memory cache + doc LRU cache 영구 유지 → ms 응답.
  # 비용: shared-cpu-1x 1GB 월 ~$2-3 (24/7 × 30d).
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
